{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KOLAY BUL EKSPRES{% endblock %}</title>
    
    <!-- Favicon - Tüm Cihazlar İçin -->
    <link rel="icon" type="image/x-icon" href="{% static 'urunler/favicon.ico' %}">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'urunler/favicon.ico' %}">
    
    <!-- Standard Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'urunler/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'urunler/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="96x96" href="{% static 'urunler/favicon-96x96.png' %}">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="{% static 'urunler/apple-icon-57x57.png' %}">
    <link rel="apple-touch-icon" sizes="60x60" href="{% static 'urunler/apple-icon-60x60.png' %}">
    <link rel="apple-touch-icon" sizes="72x72" href="{% static 'urunler/apple-icon-72x72.png' %}">
    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'urunler/apple-icon-76x76.png' %}">
    <link rel="apple-touch-icon" sizes="114x114" href="{% static 'urunler/apple-icon-114x114.png' %}">
    <link rel="apple-touch-icon" sizes="120x120" href="{% static 'urunler/apple-icon-120x120.png' %}">
    <link rel="apple-touch-icon" sizes="144x144" href="{% static 'urunler/apple-icon-144x144.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'urunler/apple-icon-180x180.png' %}">
    
    <!-- Android Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'urunler/android-icon-192x192.png' %}">
    
    <!-- MS Tiles -->
    <meta name="msapplication-TileColor" content="#f0ec09">
    <meta name="msapplication-TileImage" content="{% static 'urunler/ms-icon-144x144.png' %}">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="{% static 'urunler/manifest.json' %}">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f4f4f4 100%); margin: 0; padding: 0; }
        .navbar {
            width: 100%;
            background: black ;
            color: #f0ec09;
            padding: 8px 0;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(60,60,120,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .navbar span {
            font-size: 1.5em;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;
        }
        .navbar a {
            margin: 0;
            background: #ff4747;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9em;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
        }
        @media (min-width: 768px) {
            .navbar {
                flex-direction: row;
                padding: 0;
                height: 50%;
            }
            .navbar span {
                font-size: 3em;
                flex-basis: 80%;
                letter-spacing: 2.5px;
            }
            .navbar a {
                margin-left: 32px;
                font-size: 0.8em;
            }
        }
        .footer {
            width: 100%;
            background: #222;
            color: #fff;
            text-align: center;
            padding: 18px 0 10px 0;
            font-size: 1em;
            letter-spacing: 0.5px;
            margin-top: 40px;
        }
        .footer span { color: #bbb; font-size: 0.95em; }
        .conteiner { background: black; }

    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="navbar">
            <span>KOLAY BUL EKSPRES</span>

    </div>
    {% block content %}{% endblock %}
    <div class="footer">
        <span>© 2025 KOLAY BUL EKSPRES - Tüm hakları saklıdır.</span>
    </div>
</body>
</html>
